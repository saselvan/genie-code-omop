# discovery.yaml — file-shape reference for the omop-pipeline-builder skill.
#
# YOU DO NOT NEED TO CREATE THIS FILE TO USE THE SKILL.
#
# discovery.yaml is an OPTIONAL artifact that the agent writes (with your
# consent) at the end of Step 4 to remember workspace context across
# sessions. Cold-start sessions ask once and proceed without any setup
# file; subsequent sessions can use it as a fast path. See SKILL.md
# Step 0 for the full progressive-enhancement workflow.
#
# This file documents what the agent will save when you accept the
# "Want me to remember this for next time?" prompt — so you can read,
# diff, or hand-edit a saved discovery.yaml if you ever want to.
#
# Convention path: /Workspace/Users/<your_user>/discovery.yaml

catalog: <your_catalog>
bronze_schema: <your_bronze_schema>
ref_schema: reference

# Map each OMOP CDM v5.4 target table to its source bronze table in your
# workspace. The agent appends to this map as you build new tables; you
# rarely need to write it by hand. Example after building three tables:
#
#   table_mappings:
#     person: patient
#     visit_occurrence: encounter
#     condition_occurrence: encounter_diagnosis
table_mappings: {}
