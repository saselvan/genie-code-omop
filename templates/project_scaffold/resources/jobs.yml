# OMOP Full Build DAG — all 14 tables as commented placeholders.
# Uncomment each task as you ship its config and validate the table.
# DAG dependencies follow Round 1-4 ordering from
# .assistant/skills/omop-pipeline-builder/references/omop_dag_dependencies.md
#
# IMPORTANT: every task uses full_refresh=true. OMOP rebuilds are batch
# snapshots; incremental refresh would silently double-count rows.
#
# NOTE: With all tasks commented out, `databricks bundle validate` will
# report "no tasks defined" or similar. That's expected — uncomment your
# first task (typically person, since most other tables depend on it) once
# its config and pipeline resource are shipped.

