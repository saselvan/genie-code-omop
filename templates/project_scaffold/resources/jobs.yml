# OMOP Full Build DAG. The `person` task ships uncommented; the other 13
# OMOP CDM v5.4 tables ship as commented placeholders.
# DAG dependencies follow Round 1-4 ordering from
# .assistant/skills/omop-pipeline-builder/references/omop_dag_dependencies.md
#
# IMPORTANT: every task uses full_refresh=true. OMOP rebuilds are batch
# snapshots; incremental refresh would silently double-count rows.

resources:
  jobs:
    omop_full_build:
      name: OMOP Full Build
      tasks:
        # ─────────────────────────────────────────────────────────────
        # Round 1 — Dimension tables (no dependencies)
        # ─────────────────────────────────────────────────────────────

        # This 'person' task ships uncommented so 'bundle validate' succeeds on a
        # fresh scaffold. After your first successful build, re-comment if you're
        # not yet ready to run person, or leave it and uncomment additional tables
        # (visit_occurrence, condition_occurrence, etc.) as their configs are added.
        - task_key: person
          pipeline_task:
            pipeline_id: ${resources.pipelines.omop_person.id}
            full_refresh: true

